<div class="min-h-screen flex items-center justify-center bg-blue-50">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-600">Pata Mansa 🐾</h1>
      <p class="text-gray-500">Acesse sua conta para gerenciar os banhos</p>
    </div>

    <form class="space-y-6" (ngSubmit)="fazerLogin()">
      <div>
        <label for="email_input" class="block text-sm font-medium text-gray-700">E-mail</label>
        <input
          id="email_input"
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="username"
          required
          class="w-full px-4 py-1.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <div>
        <label for="senha_input" class="block text-sm font-medium text-gray-700">Senha</label>
        <input
          id="senha_input"
          type="password"
          [(ngModel)]="senha"
          name="senha"
          autocomplete="current-password"
          required
          class="w-full px-4 py-1.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition duration-300"
      >
        Entrar
      </button>
    </form>
  </div>
</div>
