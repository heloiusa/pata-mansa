<header class="w-full bg-blue-600 text-white shadow-md p-0.5 flex flex-wrap justify-between items-center">
  <h1 class="flex items-center gap-2 ml-2 md:ml-6 text-lg md:text-2xl font-bold tracking-tight cursor-default">
    Pata Mansa <fa-icon [icon]="iconPaw" class="text-amber-400"></fa-icon>
  </h1>
  <button (click)="alternarMenu()" class="md:hidden p-2 hover:text-amber-400 outline-none">
    <fa-icon [icon]="iconMenu" class="hover:text-amber-400"></fa-icon>
  </button>
  <nav [class.hidden]="!menuAberto"
  class="w-full md:block md:w-auto transition-all duration-300">
    <ul class="flex flex-col md:flex-row md:gap-0.5 items-end">
      <!-- Agendamentos -->
      <li>
        <a
          routerLink="/agendamentos"
          routerLinkActive="font-semibold text-amber-400"
          #rlaAgendamento="routerLinkActive"
          class="flex items-center gap-2 px-4 py-2 rounded-2xl hover:bg-blue-500 transition-all duration-300 group"
        >
          <span>Agendamentos</span>
          <fa-icon
            [icon]="iconCalendar"
            [class.opacity-100]="rlaAgendamento.isActive"
            [class.scale-100]="rlaAgendamento.isActive"
            class="opacity-60 group-hover:opacity-100 transition-all"
          ></fa-icon>
        </a>
      </li>

      <!-- Tipos de Banho -->
      <li>
        <a
          routerLink="/tipos-banho"
          routerLinkActive="font-semibold text-amber-400"
          #rlaBanhos="routerLinkActive"
          class="flex items-center gap-2 px-4 py-2 rounded-2xl hover:bg-blue-500 transition-all duration-300 group"
        >
          <span>Tipos de Banho</span>
          <fa-icon
            [icon]="iconBath"
            [class.opacity-100]="rlaBanhos.isActive"
            [class.rotate-12]="rlaBanhos.isActive"
            class="opacity-60 group-hover:opacity-100 transition-all"
          ></fa-icon>
        </a>
      </li>

      <!-- Saída -->
        <li>
        <a
          routerLink="/login"
          routerLinkActive="font-semibold text-amber-400"
          #rlaBanhos="routerLinkActive"
          class="flex items-center gap-2 px-4 py-2 rounded-2xl hover:bg-blue-500 transition-all duration-300 group"
        >
          <span>Sair</span>
          <fa-icon
            [icon]="iconLogout"
            [class.opacity-100]="rlaBanhos.isActive"
            class="opacity-60 group-hover:opacity-100 transition-all"
          ></fa-icon>
        </a>
      </li>
    </ul>
  </nav>
</header>
