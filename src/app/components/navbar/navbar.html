<header class="bg-blue-600 text-white shadow-md p-2 flex justify-between items-center">
  <h1 class="flex items-center gap-2 ml-6 text-2xl font-bold tracking-tight cursor-default">
    Pata Mansa <fa-icon [icon]="iconPaw" class="text-amber-400"></fa-icon>
  </h1>

  <nav>
    <ul class="flex gap-4 mr-6">
      <li>
        <a
          routerLink="/agendamentos"
          routerLinkActive="font-semibold text-amber-400"
          #rlaAgendamento="routerLinkActive"
          class="flex items-center gap-2 px-4 py-2 rounded-2xl hover:bg-blue-500 transition-all duration-300 group"
        >
          <span>Agendamentos</span>
          <fa-icon
            [icon]="iconCalendar"
            [class.opacity-100]="rlaAgendamento.isActive"
            [class.scale-110]="rlaAgendamento.isActive"
            class="opacity-60 group-hover:opacity-100 transition-all"
          ></fa-icon>
        </a>
      </li>

      <li>
        <a
          routerLink="/tipos-banho"
          routerLinkActive="font-semibold text-amber-400"
          #rlaBanhos="routerLinkActive"
          class="flex items-center gap-2 px-4 py-2 rounded-2xl hover:bg-blue-500 transition-all duration-300 group"
        >
          <span>Tipos de Banho</span>
          <fa-icon
            [icon]="iconBath"
            [class.opacity-100]="rlaBanhos.isActive"
            [class.rotate-12]="rlaBanhos.isActive"
            class="opacity-60 group-hover:opacity-100 transition-all"
          ></fa-icon>
        </a>
      </li>
    </ul>
  </nav>
</header>
